<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c10"/>
      <stop offset="100%" stop-color="#0b1820"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="dot" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#0d1c24"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- resume score card (right) -->
  <g opacity="0.22" transform="translate(840,50)">
    <rect x="0" y="0" width="360" height="220" rx="12" fill="#0a1820" stroke="#22c55e" stroke-width="1.5"/>
    <!-- score circle -->
    <circle cx="60" cy="65" r="44" fill="none" stroke="#1a3030" stroke-width="8"/>
    <circle cx="60" cy="65" r="44" fill="none" stroke="url(#acc)" stroke-width="8"
      stroke-dasharray="220 56" stroke-dashoffset="55" stroke-linecap="round"/>
    <text x="60" y="61" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#22c55e" text-anchor="middle">82</text>
    <text x="60" y="78" font-family="sans-serif" font-size="11" fill="#6b9" text-anchor="middle">ATS Score</text>
    <!-- skill tags -->
    <rect x="120" y="20" width="80" height="22" rx="11" fill="#22c55e" opacity="0.2"/>
    <text x="160" y="36" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">Next.js ✓</text>
    <rect x="210" y="20" width="80" height="22" rx="11" fill="#06b6d4" opacity="0.2"/>
    <text x="250" y="36" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="middle">TypeScript</text>
    <rect x="120" y="50" width="90" height="22" rx="11" fill="#22c55e" opacity="0.15"/>
    <text x="165" y="66" font-family="monospace" font-size="11" fill="#86efac" text-anchor="middle">PostgreSQL</text>
    <rect x="220" y="50" width="70" height="22" rx="11" fill="#ef4444" opacity="0.2"/>
    <text x="255" y="66" font-family="monospace" font-size="11" fill="#fca5a5" text-anchor="middle">AWS ✗</text>
    <!-- gaps -->
    <text x="120" y="105" font-family="sans-serif" font-size="12" fill="#9ca3af">Missing skills:</text>
    <rect x="120" y="114" width="70" height="20" rx="10" fill="#ef4444" opacity="0.2"/>
    <text x="155" y="129" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">Docker</text>
    <rect x="200" y="114" width="70" height="20" rx="10" fill="#f97316" opacity="0.2"/>
    <text x="235" y="129" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">Kubernetes</text>
    <!-- job platforms -->
    <text x="20" y="165" font-family="sans-serif" font-size="11" fill="#6b7280">Job Links:</text>
    <text x="20" y="182" font-family="monospace" font-size="11" fill="#22c55e">LinkedIn · Wuzzuf · Bayt · Remote OK</text>
    <text x="20" y="202" font-family="monospace" font-size="11" fill="#06b6d4">Indeed · Glassdoor · GulfTalent</text>
  </g>
  <!-- logo: W briefcase mark -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#060c10" stroke="url(#acc)" stroke-width="3"/>
    <!-- briefcase -->
    <rect x="18" y="38" width="80" height="54" rx="8" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <!-- handle -->
    <path d="M40 38 L40 28 Q58 20 76 28 L76 38" fill="none" stroke="url(#acc)" stroke-width="2.5"/>
    <!-- W letter -->
    <text x="58" y="76" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="none" stroke="url(#acc)" stroke-width="2" text-anchor="middle">W</text>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="14" fill="#22c55e" opacity="0.6" letter-spacing="5">AI CAREER COMPANION</text>
  <text x="218" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="92" font-weight="900" letter-spacing="-3" fill="#f0fff8">Wazivo</text>
  <text x="222" y="215" font-family="'SF Mono',Consolas,monospace" font-size="17" fill="url(#acc)" letter-spacing="3" opacity="0.9">RESUME SCORING · ATS REWRITING · SMART JOB DISCOVERY</text>
  <rect x="220" y="233" width="560" height="2" fill="url(#acc)" opacity="0.45"/>
  <rect x="222" y="250" width="130" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="287" y="269" font-family="monospace" font-size="13" fill="#22c55e" text-anchor="middle">ATS Scoring</text>
  <rect x="364" y="250" width="130" height="28" rx="14" fill="#06b6d4" opacity="0.15"/>
  <text x="429" y="269" font-family="monospace" font-size="13" fill="#a5f3fc" text-anchor="middle">Skill Gaps</text>
  <rect x="506" y="250" width="140" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="576" y="269" font-family="monospace" font-size="13" fill="#86efac" text-anchor="middle">11 Platforms</text>
  <text x="222" y="296" font-family="monospace" font-size="12" fill="#6b7280">وظيفو · Powered by Groq AI · wazivo.vercel.app</text>
</svg>