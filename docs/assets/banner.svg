<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07101a"/>
      <stop offset="100%" stop-color="#0e1b2c"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <pattern id="dot" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#1a2d40"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <!-- left bar -->
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- decorative CV/score bars (right) -->
  <g opacity="0.2" transform="translate(900,70)">
    <rect x="0"   y="0"  width="280" height="18" rx="9" fill="#1a2d40"/>
    <rect x="0"   y="0"  width="230" height="18" rx="9" fill="#22c55e"/>
    <text x="240" y="14" font-family="monospace" font-size="12" fill="#22c55e">92%</text>
    <rect x="0"   y="34" width="280" height="18" rx="9" fill="#1a2d40"/>
    <rect x="0"   y="34" width="180" height="18" rx="9" fill="#16a34a" opacity="0.8"/>
    <text x="190" y="48" font-family="monospace" font-size="12" fill="#22c55e">67%</text>
    <rect x="0"   y="68" width="280" height="18" rx="9" fill="#1a2d40"/>
    <rect x="0"   y="68" width="250" height="18" rx="9" fill="#22c55e" opacity="0.7"/>
    <text x="260" y="82" font-family="monospace" font-size="12" fill="#22c55e">88%</text>
    <!-- job platform dots -->
    <g transform="translate(0,120)">
      <circle cx="16"  cy="16" r="12" fill="#0a66c2" opacity="0.7"/>
      <circle cx="52"  cy="16" r="12" fill="#2557a7" opacity="0.7"/>
      <circle cx="88"  cy="16" r="12" fill="#00a0dc" opacity="0.7"/>
      <circle cx="124" cy="16" r="12" fill="#cc2929" opacity="0.7"/>
      <circle cx="160" cy="16" r="12" fill="#1e8e3e" opacity="0.7"/>
    </g>
  </g>
  <!-- logo W mark -->
  <g transform="translate(80,80)" filter="url(#glow)">
    <circle cx="60" cy="60" r="55" fill="#0a1a28" stroke="url(#acc)" stroke-width="3"/>
    <text x="22" y="82" font-family="Arial Black,sans-serif" font-size="58" font-weight="900" fill="url(#acc)">W</text>
    <circle cx="90" cy="26" r="7" fill="#22c55e" opacity="0.9"/>
  </g>
  <!-- wordmark -->
  <text x="220" y="90" font-family="sans-serif" font-size="15" fill="#22c55e" opacity="0.6" letter-spacing="4">وظيفو — Career</text>
  <text x="220" y="170" font-family="Arial Black,'Arial Bold',sans-serif" font-size="86" font-weight="900" letter-spacing="-2" fill="#e8f5e9">Wazivo</text>
  <text x="222" y="210" font-family="sans-serif" font-size="19" fill="#22c55e" letter-spacing="3" opacity="0.85">INTELLIGENT AI CAREER COMPANION</text>
  <rect x="220" y="228" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="246" width="120" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="282" y="265" font-family="sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Resume Scoring</text>
  <rect x="354" y="246" width="110" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="409" y="265" font-family="sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">ATS Rewriter</text>
  <rect x="476" y="246" width="130" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="541" y="265" font-family="sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Groq · Next.js</text>
</svg>